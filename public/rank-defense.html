<!doctype html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Rank Defense Center</title>
  <style>
    :root{--bg:#070b10;--side:#05070b;--panel:#101720;--panel2:#151a21;--panel3:#0b1118;--line:#2b3644;--text:#edf6ff;--muted:#95a3b4;--green:#00d45a;--yellow:#ffb020;--red:#ff4d4f;--blue:#58a6ff}
    *{box-sizing:border-box}body{margin:0;background:var(--bg);color:var(--text);font-family:Inter,Arial,sans-serif;font-size:13px}.sideNav{position:fixed;left:0;top:0;width:188px;height:100vh;background:var(--side);border-right:1px solid var(--line);padding:16px 14px;z-index:20}.sideNav h1{margin:0 0 6px;font-size:22px;line-height:.95;letter-spacing:-.7px}.sideNav p{margin:0 0 12px;color:var(--muted);font-size:11px}.sideNav a{width:100%;margin-bottom:7px;justify-content:flex-start;text-decoration:none}.sideNotice{margin-top:8px;padding:8px 9px;border:1px solid var(--line);background:#0a1018;border-radius:9px;font-size:11px;color:#c9d1d9;line-height:1.35}.contentMain{margin-left:188px;max-width:none;padding:14px 16px 28px}header{display:flex;align-items:center;justify-content:space-between;gap:12px;margin-bottom:10px}.brand h1{margin:0;font-size:22px}.brand p{margin:3px 0 0;color:var(--muted);font-size:12px}a{color:var(--blue);text-decoration:none}button,.buttonLink{background:#008f3a;border:1px solid rgba(255,255,255,.1);color:white;padding:7px 10px;border-radius:8px;font-weight:800;cursor:pointer;font-size:12px;display:inline-flex;align-items:center;justify-content:center;min-height:34px;text-decoration:none}button:hover,.buttonLink:hover{filter:brightness(1.12)}.navActive{background:var(--green)!important;color:#001b0b!important;box-shadow:0 0 0 2px rgba(0,212,90,.16)}input,textarea,select{background:#0a1018;border:1px solid var(--line);color:var(--text);border-radius:9px;padding:9px;width:100%;outline:none;min-height:38px}textarea{min-height:116px;resize:vertical}.panel{background:linear-gradient(180deg,var(--panel),#0d131b);border:1px solid var(--line);border-radius:14px;padding:12px;margin-bottom:10px}.fieldLabel{display:block;color:#94a3b5;font-size:10px;text-transform:uppercase;font-weight:1000;letter-spacing:.05em;margin:2px 0 5px}
    .inputGrid{display:grid;grid-template-columns:repeat(4,minmax(0,1fr));gap:9px;align-items:start}.modeInput{grid-column:1}.projectSelect,.projectNew{grid-column:2}.keywordInput{grid-column:3}.targetInput{grid-column:4}.singleDomain{grid-column:1 / 3}.domainInput{grid-column:3 / 5}.submitArea{grid-column:1 / 5;display:flex;justify-content:flex-end}.submitBtn{min-width:140px;font-size:13px}.cards{display:grid;grid-template-columns:repeat(4,minmax(0,1fr));gap:8px;margin-bottom:10px}.card{background:var(--panel2);border:1px solid var(--line);border-radius:11px;padding:9px 11px}.card b{display:block;font-size:22px;line-height:1}.card span{color:var(--muted);text-transform:uppercase;font-weight:900;font-size:9px}.kwGrid{display:grid;gap:10px}.kw{background:var(--panel2);border:1px solid var(--line);border-radius:13px;overflow:hidden}.kwHead{display:grid;grid-template-columns:minmax(0,1fr) auto auto;gap:8px;align-items:center;padding:10px 12px;border-bottom:1px solid var(--line)}.kwHead h2{margin:0;font-size:16px}.muted{color:var(--muted)}.pill{display:inline-flex;align-items:center;justify-content:center;border-radius:999px;padding:4px 7px;font-size:9px;font-weight:1000;text-transform:uppercase;line-height:1;white-space:nowrap}.pill.ok{background:var(--green);color:#001b0b}.pill.warn{background:#5f4308;color:#ffe2a0}.pill.bad{background:#7f151b;color:#ffdcd7}.pill.ext{background:#17345c;color:#cfe7ff}
    .cols{display:grid;grid-template-columns:minmax(580px,1.55fr) minmax(360px,.9fr);gap:10px;padding:10px 12px}.sub h3{margin:0 0 7px;font-size:11px;color:#dbe7f3;text-transform:uppercase;letter-spacing:.04em}.tableWrap{overflow:auto;border:1px solid var(--line);border-radius:10px;background:var(--panel3)}.suspiciousPane .resultList{max-height:520px;overflow:auto;padding-right:4px}table{width:100%;border-collapse:collapse;font-size:11px;table-layout:fixed}th,td{border-bottom:1px solid var(--line);padding:7px;text-align:left;vertical-align:middle;overflow-wrap:anywhere}tr:last-child td{border-bottom:0}th{color:var(--muted);font-size:9px;text-transform:uppercase}.domain{font-family:ui-monospace,SFMono-Regular,Menlo,Monaco,Consolas,monospace;font-weight:900}.rankMetric{display:inline-grid;grid-template-columns:auto auto;grid-template-areas:"icon label" "icon value";align-items:center;gap:0 6px;min-width:56px}.rankMetric small{grid-area:label;color:#9facbc;font-size:8px;font-weight:1000;letter-spacing:.08em;text-transform:uppercase;line-height:1}.rankMetric b{grid-area:value;color:#f3fbff;font-size:24px;line-height:.95;font-weight:1000;letter-spacing:-.5px}.rankMetric .trophyIcon{grid-area:icon;font-size:18px}.rankMetric.trophy b{color:#ffd166}.rankMetric.empty{display:inline-flex;color:#758194;font-weight:900}.resultList{display:grid;gap:6px}.resultRow{display:grid;grid-template-columns:38px minmax(0,1fr) 78px 64px;gap:7px;align-items:center;background:var(--panel3);border:1px solid var(--line);border-radius:10px;padding:7px;min-width:0}.rankBox{width:32px;height:32px;border-radius:8px;background:#101923;border:1px solid #304051;display:grid;place-items:center;font-weight:1000;color:#fff;line-height:1}.rankBox small{display:block;color:var(--muted);font-size:8px;font-weight:800}.hostLine{min-width:0}.hostLine a{font-family:ui-monospace,SFMono-Regular,Menlo,Monaco,Consolas,monospace;font-weight:1000;display:block;white-space:nowrap;overflow:hidden;text-overflow:ellipsis}.titleLine,.reasonLine{font-size:10px;line-height:1.25;margin-top:2px;white-space:nowrap;overflow:hidden;text-overflow:ellipsis}.titleLine{color:#b8c5d3}.reasonLine{color:#9facbc}.intelBtn{padding:5px 7px;min-width:58px}
    .modalBackdrop{display:none;position:fixed;inset:0;background:rgba(0,0,0,.68);z-index:50;align-items:center;justify-content:center;padding:24px}.modalBackdrop.active{display:flex}.modal{width:min(820px,100%);max-height:86vh;overflow:auto;background:#0d131b;border:1px solid #344254;border-radius:16px;box-shadow:0 30px 90px rgba(0,0,0,.55)}.modalHead{display:flex;align-items:center;justify-content:space-between;gap:10px;padding:13px 15px;border-bottom:1px solid var(--line)}.modalHead h2{font-size:16px;margin:0}.modalBody{padding:14px}.intelGrid{display:grid;grid-template-columns:125px minmax(0,1fr);border:1px solid var(--line);border-radius:10px;overflow:hidden}.intelGrid div{padding:9px;border-bottom:1px solid var(--line);overflow-wrap:anywhere}.intelGrid div:nth-child(odd){background:#101720;color:#8b98a8;font-size:10px;font-weight:1000;text-transform:uppercase}.intelGrid div:nth-last-child(-n+2){border-bottom:0}.reportOptions{margin-top:12px;border:1px solid var(--line);border-radius:12px;background:#0a1018;padding:12px}.reportOptions h3{margin:0 0 9px;font-size:12px;text-transform:uppercase;letter-spacing:.04em;color:#dbe7f3}.reportButtons{display:flex;flex-wrap:wrap;gap:8px}.reportButtons a,.reportButtons button{display:inline-flex;align-items:center;gap:6px;background:#14202d;border:1px solid #314153;color:#e9f5ff;padding:8px 10px;border-radius:9px;font-weight:900;font-size:12px;text-decoration:none}.copyBox{margin-top:10px;background:#060a0f;border:1px solid #263342;border-radius:10px;padding:10px;color:#b8c5d3;white-space:pre-wrap;font-family:ui-monospace,SFMono-Regular,Menlo,Monaco,Consolas,monospace;font-size:11px;max-height:180px;overflow:auto}.notice{color:#ffe2a0;margin-top:8px}.toolbar{display:flex;gap:7px;align-items:center;flex-wrap:wrap}.emptyBox{background:var(--panel3);border:1px dashed #354254;border-radius:10px;padding:14px;color:var(--muted);text-align:center}@media(max-width:1200px){.sideNav{position:relative;width:100%;height:auto;border-right:0;border-bottom:1px solid var(--line)}.sideNav a{width:auto;margin:0 7px 7px 0}.contentMain{margin-left:0;padding:12px}.inputGrid,.cols,.cards{grid-template-columns:1fr}.modeInput,.projectSelect,.projectNew,.keywordInput,.singleDomain,.domainInput,.targetInput,.submitArea{grid-column:auto}.kwHead{grid-template-columns:1fr}.submitArea{justify-content:stretch}.submitBtn{width:100%}.resultRow{grid-template-columns:40px minmax(0,1fr)}.resultRow>.pill,.resultRow>.intelBtn{justify-self:start}}
    @media(max-width:700px){body{font-size:12px;overflow-x:hidden}.sideNav{position:sticky;top:0;width:100%;height:auto;padding:10px 12px;z-index:40;display:grid;grid-template-columns:1fr 1fr;gap:7px;align-items:center}.sideNav h1{font-size:18px;grid-column:1/2}.sideNav p,.sideNotice{display:none}.sideNav a,.sideNav button{width:100%;margin:0;min-height:34px;padding:7px 8px;font-size:11px;border-radius:9px}.contentMain{margin-left:0;padding:10px 9px 28px}header{display:block;margin-bottom:9px}.brand h1{font-size:22px;line-height:1.05}.brand p{font-size:11px;line-height:1.35}.toolbar{margin-top:8px;display:grid;grid-template-columns:1fr 1fr}.toolbar button{width:100%}.panel{padding:9px;border-radius:12px}.inputGrid{display:grid;grid-template-columns:1fr;gap:8px}.modeInput,.projectSelect,.projectNew,.keywordInput,.singleDomain,.domainInput,.targetInput,.submitArea{grid-column:auto!important}textarea{min-height:138px}.submitArea{display:block}.submitBtn{width:100%;min-height:42px}.cards{grid-template-columns:1fr 1fr;gap:7px}.card{padding:8px}.card b{font-size:20px}.card span{font-size:8px}.kw{border-radius:13px}.kwHead{display:grid;grid-template-columns:1fr 1fr;gap:8px;padding:10px}.kwHead>div:first-child{grid-column:1/-1}.kwHead h2{font-size:18px;line-height:1.05}.kwHead .pill{justify-self:start}.kwHead button{width:100%;min-height:38px}.cols{display:grid;grid-template-columns:1fr!important;gap:12px;padding:10px}.sub h3{font-size:12px;margin-bottom:8px}.tableWrap{overflow:visible;border-radius:12px;background:transparent;border:0}table,thead,tbody,tr,td{display:block;width:100%}thead{display:none}tbody{display:grid;gap:8px}tr{background:var(--panel3);border:1px solid var(--line);border-radius:12px;overflow:hidden}td{display:grid;grid-template-columns:92px minmax(0,1fr);gap:8px;align-items:center;padding:8px 10px;border-bottom:1px solid rgba(43,54,68,.65);min-height:38px}td:last-child{border-bottom:0}td::before{color:var(--muted);font-size:9px;font-weight:1000;text-transform:uppercase;letter-spacing:.04em}td:nth-child(1)::before{content:"Domain"}td:nth-child(2)::before{content:"Status"}td:nth-child(3)::before{content:"Page"}td:nth-child(4)::before{content:"Rank"}td:nth-child(5)::before{content:"URL"}.domain{font-size:13px;line-height:1.25;word-break:break-word}.pill{width:max-content;max-width:100%;padding:5px 9px;font-size:10px}.rankMetric{min-width:0;gap:0 4px;grid-template-columns:auto auto}.rankMetric small{font-size:7px}.rankMetric b{font-size:20px}.rankMetric .trophyIcon{font-size:15px}.rankMetric.empty{font-size:14px}.suspiciousPane .resultList{max-height:none;overflow:visible;padding-right:0}.resultList{gap:8px}.resultRow{display:grid;grid-template-columns:42px minmax(0,1fr) 72px;grid-template-areas:"rank host host" "rank badge intel";gap:7px 9px;align-items:center;padding:10px;border-radius:13px}.resultRow .rankBox{grid-area:rank;width:38px;height:38px}.resultRow .hostLine{grid-area:host}.resultRow>.pill{grid-area:badge;justify-self:start}.resultRow>.intelBtn{grid-area:intel;justify-self:end;width:72px;min-width:72px}.hostLine a{font-size:14px;white-space:normal;overflow:visible;text-overflow:clip;line-height:1.15}.titleLine,.reasonLine{white-space:normal;overflow:visible;text-overflow:clip;font-size:11px;line-height:1.3}.modalBackdrop{padding:10px}.modal{max-height:88vh;border-radius:14px}.modalHead{padding:10px 12px}.modalBody{padding:10px}.intelGrid{grid-template-columns:1fr}.intelGrid div:nth-child(odd){border-bottom:0;padding-bottom:4px}.intelGrid div:nth-child(even){padding-top:4px}}
    @media(max-width:420px){.contentMain{padding-left:7px;padding-right:7px}.cards{grid-template-columns:1fr 1fr}.kwHead{grid-template-columns:1fr 1fr}.resultRow{grid-template-columns:40px minmax(0,1fr);grid-template-areas:"rank host" "rank badge" "rank intel"}.resultRow>.intelBtn{justify-self:start;width:86px}td{grid-template-columns:78px minmax(0,1fr);padding:8px}}
  </style>
</head>
<body>
<aside class="sideNav">
  <h1>Domain<br/>Radar</h1>
  <p>Command Center</p>
  <a class="buttonLink" href="/">◉ Dashboard</a>
  <a class="buttonLink" href="/#projects">▣ Projects</a>
  <a class="buttonLink navActive" href="/rank-defense.html">▥ Google Rank</a>
  <a class="buttonLink" href="/#settings">⚙ Settings</a>
  <button onclick="checkAll()">↻ Check All Rank</button>
  <div class="sideNotice" id="sideNotice">Rank Defense active</div>
</aside>
<main class="contentMain">
  <header>
    <div class="brand"><h1>Rank Defense Center</h1><p>Google Top 100 rank scanner + whitelist + suspicious domain intelligence.</p></div>
    <div class="toolbar"><button onclick="loadAll()">Refresh</button><button onclick="checkAll()">Check All</button></div>
  </header>

  <section class="panel">
    <form class="inputGrid" onsubmit="addKeyword(event)" novalidate>
      <div class="modeInput"><label class="fieldLabel">Project Mode</label><select id="projectMode" onchange="toggleProjectMode()"><option value="existing">Existing Project</option><option value="new">New Project</option></select></div>
      <div id="projectSelectWrap" class="projectSelect"><label class="fieldLabel">Existing Project</label><select id="projectSelect"><option value="">Loading projects...</option></select></div>
      <div id="projectNewWrap" class="projectNew" style="display:none"><label class="fieldLabel">New Project</label><input id="projectNew" placeholder="New project name" /></div>
      <div class="keywordInput"><label class="fieldLabel">Keyword</label><input id="keyword" placeholder="Keyword, example: empire88" /></div>
      <div class="targetInput"><label class="fieldLabel">Target URL Optional</label><input id="targetUrl" placeholder="https://example.com/page" /></div>
      <div class="singleDomain"><label class="fieldLabel">Add Whitelisted Domain</label><input id="singleDomain" placeholder="example.com" /></div>
      <div class="domainInput"><label class="fieldLabel">Bulk Whitelisted Domains</label><textarea id="domains" placeholder="One domain per line or comma separated\nempire88-as1.pages.dev\nempire88livescore.com\nempire88apk.com"></textarea></div>
      <div class="submitArea"><button class="submitBtn">Add / Merge</button></div>
    </form>
    <div id="notice" class="notice"></div>
  </section>

  <section class="cards">
    <div class="card"><b id="totalKw">0</b><span>Keyword Groups</span></div>
    <div class="card"><b id="totalDomains">0</b><span>Whitelisted Domains</span></div>
    <div class="card"><b id="foundDomains">0</b><span>Domains Found</span></div>
    <div class="card"><b id="suspiciousTotal">0</b><span>Suspicious Results</span></div>
  </section>

  <section class="panel"><div id="groups" class="kwGrid"></div></section>
</main>

<div id="intelModal" class="modalBackdrop" onclick="closeIntelModal(event)"><div class="modal" onclick="event.stopPropagation()"><div class="modalHead"><h2 id="intelTitle">Domain Intelligence</h2><button onclick="closeIntelModal()">Close</button></div><div id="intelBody" class="modalBody">Loading...</div></div></div>

<script>
const $ = (id) => document.getElementById(id);
let groups = [];
let results = [];
let projects = [];
let currentIntelReportText = '';
function esc(v){return String(v ?? '').replace(/[&<>'"]/g,m=>({'&':'&amp;','<':'&lt;','>':'&gt;',"'":'&#39;','"':'&quot;'}[m]));}
function badge(type, text){ const cls = type === 'whitelisted' || type === 'found' ? 'ok' : type === 'external_safe' ? 'ext' : type === 'suspicious' ? 'bad' : 'warn'; return `<span class="pill ${cls}">${esc(text || type)}</span>`; }
function rankMetric(value,label,isPageOne){ if(!value) return '<span class="rankMetric empty">-</span>'; return `<span class="rankMetric ${isPageOne ? 'trophy' : ''}">${isPageOne ? '<span class="trophyIcon">🏆</span>' : ''}<small>${label}</small><b>${esc(value)}</b></span>`; }
async function api(path,opt={}){ const res=await fetch(path,{credentials:'include',headers:{'Content-Type':'application/json'},...opt}); const data=await res.json().catch(()=>({})); if(!res.ok) throw new Error(data.error||'Request failed'); return data; }
function notice(msg){ $('notice').textContent = msg || ''; const side = $('sideNotice'); if(side && msg) side.textContent = msg; }
function toggleProjectMode(){ const mode=$('projectMode').value; $('projectSelectWrap').style.display = mode === 'existing' ? '' : 'none'; $('projectNewWrap').style.display = mode === 'new' ? '' : 'none'; }
function selectedProject(){ return $('projectMode').value === 'new' ? $('projectNew').value.trim() : $('projectSelect').value.trim(); }
function domainPayload(){ return [$('singleDomain').value, $('domains').value].filter(Boolean).join('\n'); }
function fillProjectSelect(){ const current = $('projectSelect').value; const names = [...new Set([...projects.map(p => p.project_name || p.name).filter(Boolean), ...groups.map(g => g.project_name).filter(Boolean)])].sort(); $('projectSelect').innerHTML = names.length ? names.map(n => `<option value="${esc(n)}">${esc(n)}</option>`).join('') : '<option value="">No project yet</option>'; if(current && names.includes(current)) $('projectSelect').value = current; }
async function addKeyword(e){
  e.preventDefault();
  const keyword = $('keyword').value.trim();
  const domains = domainPayload().trim();
  const project = selectedProject();
  if(!project) return notice('Please select an existing project or input a new project name.');
  if(!keyword) return notice('Please input keyword.');
  if(!domains) return notice('Please input at least one whitelisted domain.');
  notice('Saving keyword group...');
  await api('/api/rank/keywords',{method:'POST',body:JSON.stringify({project_name:project,keyword,domain:domains,target_url:$('targetUrl').value.trim()})});
  $('singleDomain').value=''; $('domains').value=''; $('targetUrl').value=''; notice('Saved and merged.'); await loadAll();
}
async function checkGroup(id){ notice('Scanning Google Top 100 results...'); try{ await api(`/api/rank/check/${id}`,{method:'POST'}); notice('Scan completed.'); await loadAll(); }catch(e){ notice('Scan failed: '+e.message); } }
async function checkAll(){ notice('Scanning all active keyword groups...'); try{ await api('/api/rank/check-all',{method:'POST'}); notice('All scans completed.'); await loadAll(); }catch(e){ notice('Scan failed: '+e.message); } }
async function delGroup(id){ if(!confirm('Delete this keyword group?')) return; await api(`/api/rank/keywords/${id}`,{method:'DELETE'}); await loadAll(); }
function closeIntelModal(e){ if(e && e.target.id !== 'intelModal') return; $('intelModal').classList.remove('active'); }
function googleSafeBrowsingReportUrl(domain){ return `https://safebrowsing.google.com/safebrowsing/report_phish/?url=https://${encodeURIComponent(domain)}`; }
function googleSearchUrl(query){ return `https://www.google.com/search?q=${encodeURIComponent(query)}`; }
async function copyReportText(){ try{ await navigator.clipboard.writeText(currentIntelReportText); notice('Report text copied.'); } catch(e){ notice('Copy failed. Select and copy manually from popup.'); } }
function buildReportText(x,host){ return `Phishing / suspicious domain report\n\nDomain: ${x.domain || host}\nIP: ${x.ip || '-'}\nNameserver: ${Array.isArray(x.nameservers)?x.nameservers.join(', '):'-'}\nRegistrar: ${x.registrar || '-'}\nNetwork: ${x.network_name || '-'}\nASN/Handle: ${x.asn || '-'}\nAbuse contact: ${x.abuse_email || '-'}\n\nReason: This domain appeared as a non-whitelisted Google result for a monitored brand keyword in Domain Radar and may be impersonating the brand. Please investigate and suspend/remove if it violates your abuse policy.`; }
async function openIntel(host){
  $('intelTitle').textContent = host; $('intelBody').innerHTML = 'Loading intelligence...'; $('intelModal').classList.add('active');
  const x = await api(`/api/rank/intel/${encodeURIComponent(host)}`);
  const ns = Array.isArray(x.nameservers)?x.nameservers.join(', '):'-'; const reportUrl = x.report_url || '';
  const cloudflareUrl='https://abuse.cloudflare.com/'; const registrarSearch=googleSearchUrl(`${x.domain||host} registrar abuse report`); const hostingSearch=googleSearchUrl(`${x.domain||host} hosting abuse report ${x.ip||''} ${x.network_name||''}`); const googleReport=googleSafeBrowsingReportUrl(x.domain||host);
  currentIntelReportText = buildReportText(x, host);
  $('intelBody').innerHTML = `<div class="intelGrid"><div>Domain</div><div>${esc(x.domain||host)}</div><div>IP</div><div>${esc(x.ip||'-')}</div><div>Nameserver</div><div>${esc(ns)}</div><div>Registrar</div><div>${esc(x.registrar||'-')}</div><div>Network</div><div>${esc(x.network_name||'-')}</div><div>ASN/Handle</div><div>${esc(x.asn||'-')}</div><div>Abuse</div><div>${esc(x.abuse_email||'-')}</div><div>Primary Report</div><div>${reportUrl?`<a target="_blank" href="${esc(reportUrl)}">${esc(reportUrl)}</a>`:'-'}</div></div><div class="reportOptions"><h3>Report Options</h3><div class="reportButtons">${reportUrl?`<a target="_blank" href="${esc(reportUrl)}">Open Primary Report</a>`:''}<a target="_blank" href="${cloudflareUrl}">Open Cloudflare Abuse</a><a target="_blank" href="${googleReport}">Google Safe Browsing</a><a target="_blank" href="${registrarSearch}">Search Registrar Abuse</a><a target="_blank" href="${hostingSearch}">Search Hosting Abuse</a><button onclick="copyReportText()">Copy Report Text</button></div><div class="copyBox">${esc(currentIntelReportText)}</div></div>`;
}
function groupResults(g){ return results.filter(r => Number(r.group_id) === Number(g.id)); }
function renderResultRow(r){ return `<div class="resultRow"><div class="rankBox"><div>${esc(r.position||'-')}<small>P${esc(r.page||'-')}</small></div></div><div class="hostLine"><a target="_blank" href="${esc(r.matched_url||'#')}">${esc(r.domain||'-')}</a><div class="titleLine">${esc(r.title||'No title')}</div><div class="reasonLine">${esc(r.reason||'-')}</div></div>${badge(r.classification,r.classification)}<button class="intelBtn" onclick="openIntel('${esc(r.domain)}')">Intel</button></div>`; }
function render(){
  $('totalKw').textContent=groups.length; $('totalDomains').textContent=groups.reduce((a,g)=>a+(g.domains?.length||0),0); $('foundDomains').textContent=groups.reduce((a,g)=>a+(g.domains||[]).filter(d=>d.last_position).length,0); $('suspiciousTotal').textContent=results.filter(r=>r.classification==='suspicious').length; fillProjectSelect();
  $('groups').innerHTML = groups.map(g => { const susp=groupResults(g).filter(r=>r.classification==='suspicious'); const nonWhite=groupResults(g).filter(r=>r.classification!=='whitelisted'); return `<article class="kw"><div class="kwHead"><div><h2>${esc(g.keyword)}</h2><div class="muted">${esc(g.project_name||'-')} · ${g.domain_count||0} whitelist domain · Last: ${g.last_checked_at?new Date(g.last_checked_at).toLocaleString():'never'}</div></div><div>${badge('warn',`Suspicious ${susp.length}`)}</div><div class="toolbar"><button onclick="checkGroup(${g.id})">Check</button><button onclick="delGroup(${g.id})">Delete</button></div></div><div class="cols"><div class="sub whitelistPane"><h3>Whitelisted Domains</h3><div class="tableWrap"><table><thead><tr><th style="width:48%">Domain</th><th>Status</th><th>Page</th><th>Rank</th><th>URL</th></tr></thead><tbody>${(g.domains||[]).map(d=>`<tr><td class="domain">${esc(d.domain)}</td><td>${badge(d.last_status==='found'?'found':'warn',d.last_status||'pending')}</td><td>${rankMetric(d.last_page,'PAGE',Number(d.last_page)===1)}</td><td>${rankMetric(d.last_position,'RANK',Number(d.last_page)===1)}</td><td>${d.last_matched_url?`<a target="_blank" href="${esc(d.last_matched_url)}">open</a>`:'-'}</td></tr>`).join('')}</tbody></table></div></div><div class="sub suspiciousPane"><h3>Non-whitelist / Suspicious Results</h3>${nonWhite.length?`<div class="resultList">${nonWhite.map(renderResultRow).join('')}</div>`:`<div class="emptyBox">No non-whitelist result loaded yet.</div>`}</div></div></article>`; }).join('');
}
async function loadAll(){ groups = await api('/api/rank/keywords'); results = await api('/api/rank/results'); try{ projects = await api('/api/projects'); }catch(e){ projects = []; } render(); }
loadAll().catch(e=>notice(e.message));
</script>
</body>
