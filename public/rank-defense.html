<!doctype html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Rank Defense Center</title>
  <style>
    :root{--bg:#070b10;--panel:#101720;--panel2:#151a21;--line:#2b3644;--text:#edf6ff;--muted:#95a3b4;--green:#00d45a;--yellow:#ffb020;--red:#ff4d4f;--blue:#58a6ff}
    *{box-sizing:border-box}body{margin:0;background:var(--bg);color:var(--text);font-family:Inter,Arial,sans-serif;font-size:13px}main{max-width:1680px;margin:0 auto;padding:16px}header{display:flex;align-items:center;justify-content:space-between;gap:12px;margin-bottom:12px}.brand h1{margin:0;font-size:24px}.brand p{margin:4px 0 0;color:var(--muted)}a{color:var(--blue)}button{background:#008f3a;border:1px solid rgba(255,255,255,.1);color:white;padding:8px 11px;border-radius:9px;font-weight:800;cursor:pointer}button:hover{filter:brightness(1.12)}input,textarea{background:#0a1018;border:1px solid var(--line);color:var(--text);border-radius:9px;padding:9px;width:100%;outline:none}textarea{min-height:74px}.panel{background:linear-gradient(180deg,var(--panel),#0d131b);border:1px solid var(--line);border-radius:14px;padding:14px;margin-bottom:12px}.grid{display:grid;grid-template-columns:1fr 1fr 1.4fr 1.4fr auto;gap:8px;align-items:start}.cards{display:grid;grid-template-columns:repeat(4,minmax(0,1fr));gap:9px}.card{background:var(--panel2);border:1px solid var(--line);border-radius:12px;padding:12px}.card b{display:block;font-size:24px}.card span{color:var(--muted);text-transform:uppercase;font-weight:900;font-size:10px}.kwGrid{display:grid;grid-template-columns:1fr;gap:12px}.kw{background:var(--panel2);border:1px solid var(--line);border-radius:13px;overflow:hidden}.kwHead{display:grid;grid-template-columns:1fr auto auto;gap:10px;align-items:center;padding:12px;border-bottom:1px solid var(--line)}.kwHead h2{margin:0;font-size:17px}.muted{color:var(--muted)}.pill{display:inline-flex;align-items:center;justify-content:center;border-radius:999px;padding:5px 9px;font-size:10px;font-weight:1000;text-transform:uppercase}.pill.ok{background:var(--green);color:#001b0b}.pill.warn{background:#5f4308;color:#ffe2a0}.pill.bad{background:#7f151b;color:#ffdcd7}.pill.ext{background:#17345c;color:#cfe7ff}.cols{display:grid;grid-template-columns:1fr 1.35fr;gap:10px;padding:12px}.sub h3{margin:0 0 8px;font-size:13px;color:#dbe7f3;text-transform:uppercase;letter-spacing:.04em}table{width:100%;border-collapse:collapse;font-size:12px}th,td{border-bottom:1px solid var(--line);padding:8px;text-align:left;vertical-align:top;overflow-wrap:anywhere}th{color:var(--muted);font-size:10px;text-transform:uppercase}.domain{font-family:ui-monospace,SFMono-Regular,Menlo,Monaco,Consolas,monospace;font-weight:900}.intelBox{display:none;background:#0a1018;border:1px solid var(--line);border-radius:10px;padding:10px;margin-top:8px}.intelBox.active{display:block}.notice{color:#ffe2a0;margin-top:8px}.toolbar{display:flex;gap:8px;align-items:center;flex-wrap:wrap}.small{font-size:11px;color:var(--muted)}@media(max-width:1100px){.grid,.cols,.cards{grid-template-columns:1fr}.kwHead{grid-template-columns:1fr}.toolbar{justify-content:flex-start}}
  </style>
</head>
<body>
<main>
  <header>
    <div class="brand"><h1>Rank Defense Center</h1><p>Google Top 100 rank scanner + whitelist + suspicious domain intelligence.</p></div>
    <div class="toolbar"><a href="/">← Dashboard</a><button onclick="loadAll()">Refresh</button><button onclick="checkAll()">Check All</button></div>
  </header>

  <section class="panel">
    <form class="grid" onsubmit="addKeyword(event)">
      <input id="project" placeholder="Project name, example: Empire88" />
      <input id="keyword" placeholder="Keyword, example: empire88" required />
      <textarea id="domains" placeholder="Whitelisted domains, one per line or comma separated" required></textarea>
      <input id="targetUrl" placeholder="Target URL optional" />
      <button>Add / Merge</button>
    </form>
    <div id="notice" class="notice"></div>
  </section>

  <section class="cards">
    <div class="card"><b id="totalKw">0</b><span>Keyword Groups</span></div>
    <div class="card"><b id="totalDomains">0</b><span>Whitelisted Domains</span></div>
    <div class="card"><b id="foundDomains">0</b><span>Domains Found</span></div>
    <div class="card"><b id="suspiciousTotal">0</b><span>Suspicious Results</span></div>
  </section>

  <section class="panel"><div id="groups" class="kwGrid"></div></section>
</main>
<script>
const $ = (id) => document.getElementById(id);
let groups = [];
let results = [];
function badge(type, text){ const cls = type === 'whitelisted' || type === 'found' ? 'ok' : type === 'external_safe' ? 'ext' : type === 'suspicious' ? 'bad' : 'warn'; return `<span class="pill ${cls}">${text || type}</span>`; }
async function api(path, opt={}){ const res = await fetch(path,{credentials:'include',headers:{'Content-Type':'application/json'},...opt}); const data = await res.json().catch(()=>({})); if(!res.ok) throw new Error(data.error || 'Request failed'); return data; }
function notice(msg){ $('notice').textContent = msg || ''; }
async function addKeyword(e){ e.preventDefault(); notice('Saving keyword group...'); await api('/api/rank/keywords',{method:'POST',body:JSON.stringify({project_name:$('project').value,keyword:$('keyword').value,domain:$('domains').value,target_url:$('targetUrl').value})}); $('keyword').value=''; $('domains').value=''; $('targetUrl').value=''; notice('Saved and merged.'); await loadAll(); }
async function checkGroup(id){ notice('Scanning Google Top 100 results...'); await api(`/api/rank/check/${id}`,{method:'POST'}); notice('Scan completed.'); await loadAll(); }
async function checkAll(){ notice('Scanning all active keyword groups...'); await api('/api/rank/check-all',{method:'POST'}); notice('All scans completed.'); await loadAll(); }
async function delGroup(id){ if(!confirm('Delete this keyword group?')) return; await api(`/api/rank/keywords/${id}`,{method:'DELETE'}); await loadAll(); }
async function loadIntel(host, id){ const box = document.getElementById(id); box.classList.toggle('active'); if(box.dataset.loaded) return; box.innerHTML = 'Loading intelligence...'; const x = await api(`/api/rank/intel/${encodeURIComponent(host)}`); box.dataset.loaded = '1'; box.innerHTML = `<b>${x.domain || host}</b><table><tbody><tr><th>IP</th><td>${x.ip || '-'}</td></tr><tr><th>Nameserver</th><td>${Array.isArray(x.nameservers)?x.nameservers.join(', '):'-'}</td></tr><tr><th>Registrar</th><td>${x.registrar || '-'}</td></tr><tr><th>Network</th><td>${x.network_name || '-'}</td></tr><tr><th>ASN/Handle</th><td>${x.asn || '-'}</td></tr><tr><th>Abuse</th><td>${x.abuse_email || '-'}</td></tr><tr><th>Report</th><td>${x.report_url ? `<a target="_blank" href="${x.report_url}">${x.report_url}</a>` : '-'}</td></tr></tbody></table>`; }
function groupResults(g){ return results.filter(r => Number(r.group_id) === Number(g.id)); }
function render(){
  $('totalKw').textContent = groups.length;
  $('totalDomains').textContent = groups.reduce((a,g)=>a+(g.domains?.length||0),0);
  $('foundDomains').textContent = groups.reduce((a,g)=>a+(g.domains||[]).filter(d=>d.last_position).length,0);
  $('suspiciousTotal').textContent = results.filter(r=>r.classification==='suspicious').length;
  $('groups').innerHTML = groups.map(g => {
    const gr = groupResults(g);
    const susp = gr.filter(r=>r.classification==='suspicious');
    const nonWhite = gr.filter(r=>r.classification!=='whitelisted');
    return `<article class="kw"><div class="kwHead"><div><h2>${g.keyword}</h2><div class="muted">${g.project_name || '-'} · ${g.domain_count || 0} whitelist domain · Last: ${g.last_checked_at ? new Date(g.last_checked_at).toLocaleString() : 'never'}</div></div><div>${badge('warn', `Suspicious ${susp.length}`)}</div><div class="toolbar"><button onclick="checkGroup(${g.id})">Check</button><button onclick="delGroup(${g.id})">Delete</button></div></div><div class="cols"><div class="sub"><h3>Whitelisted Domains</h3><table><thead><tr><th>Domain</th><th>Status</th><th>Page</th><th>Rank</th><th>URL</th></tr></thead><tbody>${(g.domains||[]).map(d=>`<tr><td class="domain">${d.domain}</td><td>${badge(d.last_status==='found'?'found':'warn',d.last_status||'pending')}</td><td>${d.last_page||'-'}</td><td>${d.last_position||'-'}</td><td>${d.last_matched_url?`<a target="_blank" href="${d.last_matched_url}">open</a>`:'-'}</td></tr>`).join('')}</tbody></table></div><div class="sub"><h3>Non-whitelist / Suspicious Results</h3><table><thead><tr><th>Rank</th><th>Host</th><th>Status</th><th>Reason</th><th>Intel</th></tr></thead><tbody>${nonWhite.length?nonWhite.map((r,i)=>`<tr><td>${r.position}<div class="small">Page ${r.page}</div></td><td class="domain"><a target="_blank" href="${r.matched_url}">${r.domain}</a><div class="small">${r.title||''}</div><div id="intel-${g.id}-${i}" class="intelBox"></div></td><td>${badge(r.classification,r.classification)}</td><td>${r.reason||'-'}</td><td><button onclick="loadIntel('${r.domain}','intel-${g.id}-${i}')">Intel / Report</button></td></tr>`).join(''):`<tr><td colspan="5" class="muted">No non-whitelist result loaded yet.</td></tr>`}</tbody></table></div></div></article>`;
  }).join('');
}
async function loadAll(){ groups = await api('/api/rank/keywords'); results = await api('/api/rank/results'); render(); }
loadAll().catch(e=>notice(e.message));
</script>
</body>
</html>
