<!doctype html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Rank Defense Center</title>
  <style>
    :root{--bg:#070b10;--panel:#101720;--panel2:#151a21;--panel3:#0b1118;--line:#2b3644;--text:#edf6ff;--muted:#95a3b4;--green:#00d45a;--yellow:#ffb020;--red:#ff4d4f;--blue:#58a6ff}
    *{box-sizing:border-box}body{margin:0;background:var(--bg);color:var(--text);font-family:Inter,Arial,sans-serif;font-size:13px}main{max-width:1760px;margin:0 auto;padding:14px}header{display:flex;align-items:center;justify-content:space-between;gap:12px;margin-bottom:10px}.brand h1{margin:0;font-size:22px}.brand p{margin:3px 0 0;color:var(--muted);font-size:12px}a{color:var(--blue);text-decoration:none}a:hover{text-decoration:underline}button{background:#008f3a;border:1px solid rgba(255,255,255,.1);color:white;padding:7px 10px;border-radius:8px;font-weight:800;cursor:pointer;font-size:12px}button:hover{filter:brightness(1.12)}input,textarea{background:#0a1018;border:1px solid var(--line);color:var(--text);border-radius:9px;padding:9px;width:100%;outline:none}textarea{min-height:116px;resize:vertical}.panel{background:linear-gradient(180deg,var(--panel),#0d131b);border:1px solid var(--line);border-radius:14px;padding:12px;margin-bottom:10px}.inputGrid{display:grid;grid-template-columns:1fr 1fr 1.35fr auto;gap:8px;align-items:start}.domainInput{grid-column:1 / 3}.targetInput{grid-column:3 / 4}.submitBtn{grid-column:4 / 5;grid-row:1 / 3;align-self:stretch;min-width:106px}.cards{display:grid;grid-template-columns:repeat(4,minmax(0,1fr));gap:8px;margin-bottom:10px}.card{background:var(--panel2);border:1px solid var(--line);border-radius:11px;padding:9px 11px}.card b{display:block;font-size:22px;line-height:1}.card span{color:var(--muted);text-transform:uppercase;font-weight:900;font-size:9px}.kwGrid{display:grid;grid-template-columns:1fr;gap:10px}.kw{background:var(--panel2);border:1px solid var(--line);border-radius:13px;overflow:hidden}.kwHead{display:grid;grid-template-columns:minmax(0,1fr) auto auto;gap:8px;align-items:center;padding:10px 12px;border-bottom:1px solid var(--line)}.kwHead h2{margin:0;font-size:16px}.muted{color:var(--muted)}.pill{display:inline-flex;align-items:center;justify-content:center;border-radius:999px;padding:4px 7px;font-size:9px;font-weight:1000;text-transform:uppercase;line-height:1;white-space:nowrap}.pill.ok{background:var(--green);color:#001b0b}.pill.warn{background:#5f4308;color:#ffe2a0}.pill.bad{background:#7f151b;color:#ffdcd7}.pill.ext{background:#17345c;color:#cfe7ff}.cols{display:grid;grid-template-columns:minmax(360px,.75fr) minmax(0,1.55fr);gap:10px;padding:10px 12px}.sub h3{margin:0 0 7px;font-size:11px;color:#dbe7f3;text-transform:uppercase;letter-spacing:.04em}.tableWrap{overflow:auto;border:1px solid var(--line);border-radius:10px;background:var(--panel3)}table{width:100%;border-collapse:collapse;font-size:11px;table-layout:fixed}th,td{border-bottom:1px solid var(--line);padding:7px;text-align:left;vertical-align:middle;overflow-wrap:anywhere}tr:last-child td{border-bottom:0}th{color:var(--muted);font-size:9px;text-transform:uppercase}.domain{font-family:ui-monospace,SFMono-Regular,Menlo,Monaco,Consolas,monospace;font-weight:900}.resultList{display:grid;gap:6px}.resultRow{display:grid;grid-template-columns:44px minmax(0,1fr) 96px 82px;gap:8px;align-items:center;background:var(--panel3);border:1px solid var(--line);border-radius:10px;padding:8px;min-width:0}.rankBox{width:36px;height:36px;border-radius:9px;background:#101923;border:1px solid #304051;display:grid;place-items:center;font-weight:1000;color:#fff;line-height:1}.rankBox small{display:block;color:var(--muted);font-size:8px;font-weight:800}.hostLine{min-width:0}.hostLine a{font-family:ui-monospace,SFMono-Regular,Menlo,Monaco,Consolas,monospace;font-weight:1000;display:block;white-space:nowrap;overflow:hidden;text-overflow:ellipsis}.titleLine{font-size:10.5px;color:#b8c5d3;line-height:1.25;margin-top:2px;white-space:nowrap;overflow:hidden;text-overflow:ellipsis}.reasonLine{font-size:10.5px;color:#9facbc;line-height:1.25;white-space:nowrap;overflow:hidden;text-overflow:ellipsis}.intelBtn{padding:6px 8px;min-width:74px}.modalBackdrop{display:none;position:fixed;inset:0;background:rgba(0,0,0,.68);z-index:50;align-items:center;justify-content:center;padding:24px}.modalBackdrop.active{display:flex}.modal{width:min(760px,100%);max-height:86vh;overflow:auto;background:#0d131b;border:1px solid #344254;border-radius:16px;box-shadow:0 30px 90px rgba(0,0,0,.55)}.modalHead{display:flex;align-items:center;justify-content:space-between;gap:10px;padding:13px 15px;border-bottom:1px solid var(--line)}.modalHead h2{font-size:16px;margin:0}.modalBody{padding:14px}.intelGrid{display:grid;grid-template-columns:125px minmax(0,1fr);border:1px solid var(--line);border-radius:10px;overflow:hidden}.intelGrid div{padding:9px;border-bottom:1px solid var(--line);overflow-wrap:anywhere}.intelGrid div:nth-child(odd){background:#101720;color:#8b98a8;font-size:10px;font-weight:1000;text-transform:uppercase}.intelGrid div:nth-last-child(-n+2){border-bottom:0}.notice{color:#ffe2a0;margin-top:8px}.toolbar{display:flex;gap:7px;align-items:center;flex-wrap:wrap}.small{font-size:11px;color:var(--muted)}.emptyBox{background:var(--panel3);border:1px dashed #354254;border-radius:10px;padding:14px;color:var(--muted);text-align:center}@media(max-width:1200px){.inputGrid,.cols,.cards{grid-template-columns:1fr}.domainInput,.targetInput,.submitBtn{grid-column:auto;grid-row:auto}.kwHead{grid-template-columns:1fr}.toolbar{justify-content:flex-start}.resultRow{grid-template-columns:40px minmax(0,1fr);}.resultRow>.pill,.resultRow>.intelBtn{justify-self:start}}
  </style>
</head>
<body>
<main>
  <header>
    <div class="brand"><h1>Rank Defense Center</h1><p>Google Top 100 rank scanner + whitelist + suspicious domain intelligence.</p></div>
    <div class="toolbar"><a href="/">← Dashboard</a><button onclick="loadAll()">Refresh</button><button onclick="checkAll()">Check All</button></div>
  </header>

  <section class="panel">
    <form class="inputGrid" onsubmit="addKeyword(event)">
      <input id="project" placeholder="Project name, example: Empire88" />
      <input id="keyword" placeholder="Keyword, example: empire88" required />
      <textarea id="domains" class="domainInput" placeholder="Whitelisted domains, one per line or comma separated\nempire88-as1.pages.dev\nempire88livescore.com\nempire88apk.com" required></textarea>
      <input id="targetUrl" class="targetInput" placeholder="Target URL optional" />
      <button class="submitBtn">Add / Merge</button>
    </form>
    <div id="notice" class="notice"></div>
  </section>

  <section class="cards">
    <div class="card"><b id="totalKw">0</b><span>Keyword Groups</span></div>
    <div class="card"><b id="totalDomains">0</b><span>Whitelisted Domains</span></div>
    <div class="card"><b id="foundDomains">0</b><span>Domains Found</span></div>
    <div class="card"><b id="suspiciousTotal">0</b><span>Suspicious Results</span></div>
  </section>

  <section class="panel"><div id="groups" class="kwGrid"></div></section>
</main>

<div id="intelModal" class="modalBackdrop" onclick="closeIntelModal(event)">
  <div class="modal" onclick="event.stopPropagation()">
    <div class="modalHead"><h2 id="intelTitle">Domain Intelligence</h2><button onclick="closeIntelModal()">Close</button></div>
    <div id="intelBody" class="modalBody">Loading...</div>
  </div>
</div>

<script>
const $ = (id) => document.getElementById(id);
let groups = [];
let results = [];
function esc(v){return String(v ?? '').replace(/[&<>'"]/g,m=>({'&':'&amp;','<':'&lt;','>':'&gt;',"'":'&#39;','"':'&quot;'}[m]));}
function badge(type, text){ const cls = type === 'whitelisted' || type === 'found' ? 'ok' : type === 'external_safe' ? 'ext' : type === 'suspicious' ? 'bad' : 'warn'; return `<span class="pill ${cls}">${esc(text || type)}</span>`; }
async function api(path, opt={}){ const res = await fetch(path,{credentials:'include',headers:{'Content-Type':'application/json'},...opt}); const data = await res.json().catch(()=>({})); if(!res.ok) throw new Error(data.error || 'Request failed'); return data; }
function notice(msg){ $('notice').textContent = msg || ''; }
async function addKeyword(e){ e.preventDefault(); notice('Saving keyword group...'); await api('/api/rank/keywords',{method:'POST',body:JSON.stringify({project_name:$('project').value,keyword:$('keyword').value,domain:$('domains').value,target_url:$('targetUrl').value})}); $('keyword').value=''; $('domains').value=''; $('targetUrl').value=''; notice('Saved and merged.'); await loadAll(); }
async function checkGroup(id){ notice('Scanning Google Top 100 results...'); try{ await api(`/api/rank/check/${id}`,{method:'POST'}); notice('Scan completed.'); await loadAll(); }catch(e){ notice('Scan failed: '+e.message); } }
async function checkAll(){ notice('Scanning all active keyword groups...'); try{ await api('/api/rank/check-all',{method:'POST'}); notice('All scans completed.'); await loadAll(); }catch(e){ notice('Scan failed: '+e.message); } }
async function delGroup(id){ if(!confirm('Delete this keyword group?')) return; await api(`/api/rank/keywords/${id}`,{method:'DELETE'}); await loadAll(); }
function closeIntelModal(e){ if(e && e.target.id !== 'intelModal') return; $('intelModal').classList.remove('active'); }
async function openIntel(host){ $('intelTitle').textContent = host; $('intelBody').innerHTML = 'Loading intelligence...'; $('intelModal').classList.add('active'); const x = await api(`/api/rank/intel/${encodeURIComponent(host)}`); const ns = Array.isArray(x.nameservers)?x.nameservers.join(', '):'-'; $('intelBody').innerHTML = `<div class="intelGrid"><div>Domain</div><div>${esc(x.domain || host)}</div><div>IP</div><div>${esc(x.ip || '-')}</div><div>Nameserver</div><div>${esc(ns)}</div><div>Registrar</div><div>${esc(x.registrar || '-')}</div><div>Network</div><div>${esc(x.network_name || '-')}</div><div>ASN/Handle</div><div>${esc(x.asn || '-')}</div><div>Abuse</div><div>${esc(x.abuse_email || '-')}</div><div>Report</div><div>${x.report_url ? `<a target="_blank" href="${esc(x.report_url)}">${esc(x.report_url)}</a>` : '-'}</div></div>`; }
function groupResults(g){ return results.filter(r => Number(r.group_id) === Number(g.id)); }
function renderResultRow(r){ return `<div class="resultRow"><div class="rankBox"><div>${esc(r.position||'-')}<small>P${esc(r.page||'-')}</small></div></div><div class="hostLine"><a target="_blank" href="${esc(r.matched_url||'#')}">${esc(r.domain||'-')}</a><div class="titleLine">${esc(r.title||'No title')}</div><div class="reasonLine">${esc(r.reason||'-')}</div></div>${badge(r.classification,r.classification)}<button class="intelBtn" onclick="openIntel('${esc(r.domain)}')">Intel</button></div>`; }
function render(){
  $('totalKw').textContent = groups.length;
  $('totalDomains').textContent = groups.reduce((a,g)=>a+(g.domains?.length||0),0);
  $('foundDomains').textContent = groups.reduce((a,g)=>a+(g.domains||[]).filter(d=>d.last_position).length,0);
  $('suspiciousTotal').textContent = results.filter(r=>r.classification==='suspicious').length;
  $('groups').innerHTML = groups.map(g => {
    const gr = groupResults(g);
    const susp = gr.filter(r=>r.classification==='suspicious');
    const nonWhite = gr.filter(r=>r.classification!=='whitelisted');
    return `<article class="kw"><div class="kwHead"><div><h2>${esc(g.keyword)}</h2><div class="muted">${esc(g.project_name || '-')} · ${g.domain_count || 0} whitelist domain · Last: ${g.last_checked_at ? new Date(g.last_checked_at).toLocaleString() : 'never'}</div></div><div>${badge('warn', `Suspicious ${susp.length}`)}</div><div class="toolbar"><button onclick="checkGroup(${g.id})">Check</button><button onclick="delGroup(${g.id})">Delete</button></div></div><div class="cols"><div class="sub"><h3>Whitelisted Domains</h3><div class="tableWrap"><table><thead><tr><th style="width:46%">Domain</th><th>Status</th><th>Page</th><th>Rank</th><th>URL</th></tr></thead><tbody>${(g.domains||[]).map(d=>`<tr><td class="domain">${esc(d.domain)}</td><td>${badge(d.last_status==='found'?'found':'warn',d.last_status||'pending')}</td><td>${d.last_page||'-'}</td><td>${d.last_position||'-'}</td><td>${d.last_matched_url?`<a target="_blank" href="${esc(d.last_matched_url)}">open</a>`:'-'}</td></tr>`).join('')}</tbody></table></div></div><div class="sub"><h3>Non-whitelist / Suspicious Results</h3>${nonWhite.length?`<div class="resultList">${nonWhite.map(renderResultRow).join('')}</div>`:`<div class="emptyBox">No non-whitelist result loaded yet.</div>`}</div></div></article>`;
  }).join('');
}
async function loadAll(){ groups = await api('/api/rank/keywords'); results = await api('/api/rank/results'); render(); }
loadAll().catch(e=>notice(e.message));
</script>
</body>
</html>
