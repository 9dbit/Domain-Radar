<!doctype html>
<html>
  <head>
    <meta charset="UTF-8" />
    <title>Domain Radar</title>
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <link rel="stylesheet" href="/sidebar.css" />
    <link rel="stylesheet" href="/app-patches.css" />
    <link rel="stylesheet" href="/logo-rotation.css" />
    <link rel="stylesheet" href="/rank-defense-v2.css" />
    <link rel="stylesheet" href="/onboarding-ui.css" />
    <link rel="stylesheet" href="/billing-ui.css" />
    <link rel="stylesheet" href="/quota-ui.css" />
    <link rel="stylesheet" href="/admin-ops-ui.css" />
    <style>
      .badge.working {
        font-size: 0 !important;
      }
      .badge.working::after {
        content: "NORMAL";
        font-size: 9.5px !important;
        font-weight: 1000;
        letter-spacing: .03em;
      }
      .cards .card:nth-child(2) span {
        font-size: 0 !important;
      }
      .cards .card:nth-child(2) span::after {
        content: "NORMAL";
        font-size: 11px !important;
        color: var(--muted);
        font-weight: 800;
        text-transform: uppercase;
        letter-spacing: .04em;
      }
      .batteryGauge,
      .signalGauge {
        background: transparent !important;
        border: 0 !important;
        border-radius: 0 !important;
        padding: 3px 0 !important;
        min-height: 40px !important;
      }
      .signalBars span {
        border: 0 !important;
      }
      .nodeTelemetryRow {
        gap: 4px !important;
      }
    </style>
  </head>

    <div id="root"></div>
    <script type="module" src="/src/App.jsx"></script>
    <script src="/login-email-ui.js" defer></script>
    <script src="/auth-route-ui.js" defer></script>
    <script src="/ui-polish.js" defer></script>
    <script src="/seo-project-ui.js" defer></script>
    <script src="/settings-all-ui.js" defer></script>
    <script src="/onboarding-ui.js" defer></script>
    <script src="/billing-ui.js" defer></script>
    <script src="/quota-ui.js" defer></script>
    <script src="/admin-ops-ui.js" defer></script>
  </body>
